<style>
:root {
  --bg: #0d0f14;
  --card: #151922;
  --primary: #FCC133;
  --secondary: #15357B;
  --text: #e6e8ee;
  --muted: #9aa3b2;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  height: 100%;
  background: radial-gradient(
    circle at top,
    #1c2230 0%,
    #131722 50%,
    #0f131a 100%
  );

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100dvh;
  color: var(--text);
}

/* CARD */
.card {
  width: 340px;

  /* BACKGROUND PREMIUM */
  background: linear-gradient(
    160deg,
    rgba(21, 25, 34, 0.95),
    rgba(21, 53, 123, 0.4)
  );

  backdrop-filter: blur(12px);
  border-radius: 24px;
  overflow: hidden;

  /* GLOW GIALLO (soft) */
  border: 1px solid rgba(252, 193, 51, 0.15);

  /* profondità */
  box-shadow:
    0 20px 60px rgba(0, 0, 0, 0.6),
    0 0 20px rgba(252, 193, 51, 0.08);

  /* Apple-style entry */
  opacity: 0;
  transform: scale(0.92) translateY(20px);
  animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes cardEnter {
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* HEADER */
.header {
  padding: 24px 20px 10px;
  text-align: center;
}

/* LOGO */
.logo img {
  height: 90px;
  opacity: 0.9;
}

/* AVATAR */
.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  margin: 10px auto 0px;
  overflow: hidden;
  border: 3px solid var(--primary);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTENT */
.content {
  padding: 0px 24px 24px 24px;
  text-align: center;
}

.name {
  font-size: 22px;
  font-weight: 600;
}

.role {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 16px;
}

.info {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 8px;
  margin: 22px 0;
}

.actions a {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  color: var(--text);
  transition: 0.2s;
}

.actions a:hover {
  background: var(--primary);
  color: #000;
}

.actions svg {
  width: 20px;
}

/* CTA */
.cta {
  display: block;
  background: var(--primary);
  color: #000;
  padding: 12px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 600;
}

.cta:hover {
  filter: brightness(0.95);
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.footer a {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  font-size: 13px;
  text-decoration: none;
  color: var(--muted);
  transition: 0.2s;
}

.footer a:hover {
  background: var(--primary);
  color: #000;
}

/* ICONS (unificato) */
.footer svg,
.footer .icon-svg {
  width: 18px;
  height: 18px;
}

/* SVG esterno */
.icon-svg {
  opacity: 0.7;
  filter: brightness(0) saturate(100%) invert(70%) sepia(6%) saturate(300%) hue-rotate(180deg);
  transition: 0.2s;
}

/* Hover */
.footer a:hover .icon-svg {
  opacity: 1;
  filter: brightness(0) saturate(100%) invert(0%);
}

</style>
</head>
